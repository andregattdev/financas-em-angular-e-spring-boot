spring.application.name=api-financas

# Porta do servidor
server.port=8080

# Banco de dados — use variáveis de ambiente em produção
spring.datasource.url=jdbc:postgresql://localhost:5432/api-financas
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.data.web.pageable.serialization-mode=via-dto

# JWT — defina JWT_SECRET em produção com pelo menos 64 caracteres aleatórios
jwt.secret=${JWT_SECRET:dev-local-secret-nao-usar-em-producao-minimo-64-chars-123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# E-mail — defina MAIL_PASSWORD em produção (nunca comite a senha real)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:andregatt.dev@gmail.com}
spring.mail.password=${MAIL_PASSWORD:senha_dev_local}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
